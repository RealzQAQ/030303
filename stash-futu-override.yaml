rule-providers:
  futu:
    type: http
    behavior: domain
    format: yaml
    path: ./rule-providers/futu.yaml
    url: https://cdn.jsdelivr.net/gh/RealzQAQ/030303@main/futu.yaml
    interval: 86400

proxy-groups:
  - name: 富途APP
    type: select
proxies:
  - 节点代理
  - 自动选择
  - DIRECT

rules:
  - RULE-SET,futu,富途APP
