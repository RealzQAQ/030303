[custom]
; ACL4SSR full grouping + Futu rules
; Use ASCII group names to avoid encoding issues on converter panels.

ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
