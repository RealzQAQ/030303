ruleset=REJECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=REJECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list
ruleset=FCM,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/GoogleFCM.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GoogleCN.list
ruleset=Microsoft,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/OneDrive.list
ruleset=Microsoft,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
ruleset=Apple,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
ruleset=Telegram,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=AI,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/AI.list
ruleset=AI,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list
ruleset=YouTube,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=Netflix,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
ruleset=Spotify,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Spotify.list
ruleset=Game,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Steam.list
ruleset=Game,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Epic.list
ruleset=Game,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Nintendo.list
ruleset=FUTU,https://github.com/RealzQAQ/030303/blob/main/futu.list.txt
ruleset=Proxy,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=DIRECT,[]GEOIP,CN
ruleset=MATCH,[]FINAL

custom_proxy_group=Proxy`select`[]AUTO`[]FALLBACK`[]LOAD-BALANCE`[]HK`[]SG`[]JP`[]US`[]Others`[]DIRECT
custom_proxy_group=FUTU`select`[]HK`[]SG`[]Proxy`[]DIRECT
custom_proxy_group=Telegram`select`[]Proxy`[]HK`[]SG`[]JP`[]US`[]Others`[]DIRECT
custom_proxy_group=AI`select`[]Proxy`[]US`[]JP`[]SG`[]HK`[]Others`[]DIRECT
custom_proxy_group=YouTube`select`[]Proxy`[]HK`[]SG`[]JP`[]US`[]Others`[]DIRECT
custom_proxy_group=Netflix`select`[]Proxy`[]HK`[]SG`[]JP`[]US`[]Others`[]DIRECT
custom_proxy_group=Spotify`select`[]Proxy`[]HK`[]SG`[]JP`[]US`[]Others`[]DIRECT
custom_proxy_group=Microsoft`select`[]DIRECT`[]Proxy`[]US`[]HK`[]SG
custom_proxy_group=Apple`select`[]DIRECT`[]Proxy`[]HK`[]SG`[]US
custom_proxy_group=FCM`select`[]DIRECT`[]Proxy`[]US`[]HK`[]SG
custom_proxy_group=Game`select`[]DIRECT`[]Proxy`[]HK`[]SG`[]JP`[]US
custom_proxy_group=DIRECT`select`[]DIRECT`[]Proxy
custom_proxy_group=REJECT`select`[]REJECT`[]DIRECT
custom_proxy_group=MATCH`select`[]Proxy`[]AUTO`[]DIRECT`[]HK`[]SG`[]JP`[]US`[]Others

custom_proxy_group=AUTO`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=FALLBACK`fallback`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=LOAD-BALANCE`load-balance`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=HK`url-test`(港|HK|Hong Kong|HongKong|hongkong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=SG`url-test`(新加坡|狮城|SG|Singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=JP`url-test`(日|JP|Japan|Tokyo|Osaka)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=US`url-test`(美|US|United States|America|Los Angeles|San Jose|Silicon Valley)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=Others`select`.*

enable_rule_generator=true
overwrite_original_rules=true
clash_rule_base=https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GeneralClashConfig.yml
